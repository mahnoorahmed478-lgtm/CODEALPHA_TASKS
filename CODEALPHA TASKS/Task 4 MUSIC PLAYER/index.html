<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Music Player Studio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="player">

  <h1 class="main-heading">🎵 Music Player Studio</h1>

  <img id="cover" src="https://picsum.photos/300" class="cover">

  <h2 id="title">Dream Music</h2>
  <p id="artist">Unknown Artist</p>

  <audio id="audio"></audio>

  <input type="range" id="progress" value="0">

  <div class="time">
    <span id="current">0:00</span>
    <span id="duration">0:00</span>
  </div>

 <div class="controls">
  <button id="shuffle">🔀 Shuffle</button>
  <button id="prev">⏮ Prev</button>
  <button id="play">▶ Play</button>
  <button id="next">Next ⏭</button>
  <button id="loop">🔁 Loop</button>
</div>

  <div class="volume-box">
    🔊
    <input type="range" id="volume" min="0" max="1" step="0.1" value="1">
  </div>

  <div class="playlist-section">

    <h3>Hindi Playlist</h3>
    <ul id="hindi-list"></ul>

    <h3>English Playlist</h3>
    <ul id="english-list"></ul>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
