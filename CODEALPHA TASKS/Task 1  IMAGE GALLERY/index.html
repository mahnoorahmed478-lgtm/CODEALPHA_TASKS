<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modern Image Gallery</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="container">
  <h1>Creative Image Gallery</h1>

  <div class="filter-buttons">
    <button class="active" data-filter="all">All</button>
    <button data-filter="nature">Nature</button>
    <button data-filter="city">City</button>
    <button data-filter="animals">Animals</button>
  </div>

  <div class="gallery">
    <div class="gallery-item nature">
      <img src="https://picsum.photos/id/1015/600/400" alt="" />
    </div>

    <div class="gallery-item city">
      <img src="https://picsum.photos/id/1011/600/400" alt="" />
    </div>

    <div class="gallery-item animals">
      <img src="https://picsum.photos/id/1025/600/400" alt="" />
    </div>

    <div class="gallery-item nature">
      <img src="https://picsum.photos/id/1039/600/400" alt="" />
    </div>

    <div class="gallery-item city">
      <img src="https://picsum.photos/id/1043/600/400" alt="" />
    </div>

    <div class="gallery-item animals">
      <img src="https://picsum.photos/id/1062/600/400" alt="" />
    </div>
  </div>
</div>

<div class="lightbox">
  <span class="close">×</span>
  <img class="lightbox-img" src="" alt="" />

  <button class="prev">❮</button>
  <button class="next">❯</button>
</div>

<script src="script.js"></script>
</body>
</html>
